<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>电子报告阅读</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #333; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <!-- 使用公用 PDF.js 预览器，动态获取当前网站下的 report.pdf -->
    <iframe id="pdf-viewer" src=""></iframe>

    <script>
        // 自动获取当前部署后的绝对域名，拼接给 PDF.js 预览器，彻底解决手机端打不开的问题
        const currentHost = window.location.origin;
        const pdfUrl = currentHost + '/report.pdf';
        document.getElementById('pdf-viewer').src = 'https://mozilla.github.io/pdf.js/web/viewer.html?file=' + encodeURIComponent(pdfUrl);
    </script>
</body>
</html>
