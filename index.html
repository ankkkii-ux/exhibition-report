<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>电子报告阅读</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #333; }
        /* 针对 iOS 和现代移动浏览器的完美嵌入容器 */
        .pdf-container { width: 100%; height: 100%; border: none; -webkit-overflow-scrolling: touch; overflow-y: scroll; }
        object, embed { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="pdf-container">
        <!-- 优先使用标准的 object 标签加载同域下的 PDF，彻底杜绝跨域问题 -->
        <object data="./report.pdf" type="application/pdf">
            <!-- 如果部分极老旧手机不支持 object，则自动降级使用 embed 标签 -->
            <embed src="./report.pdf" type="application/pdf" />
        </object>
    </div>

</body>
</html>
